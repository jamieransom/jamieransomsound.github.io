    <!-- Stylesheet Sources -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@500;700&family=Open+Sans:wght@400;700&family=Poppins:wght@700;900&display=swap" rel="stylesheet">
    <style>
      *, *::before, *::after {
        box-sizing: border-box;
      }

      html {
        min-width: 320px;
        font-size: 18pt;
      }

      body {
        margin: 0;
        min-width: 320px;
        min-height: 100vh;
        color: #f0f0f0;
        background:
          linear-gradient(55deg, #431f54 0%, #151226 60%, #17254a 100%);
        overflow-x: hidden;
        -webkit-text-size-adjust: none;
      }

      a {
        color: inherit;
      }

      .page {
        min-height: 100vh;
        position: relative;
        z-index: 1;
      }

      .hero {
        display: flex;
        min-height: 100vh;
        align-items: center;
        justify-content: center;
        padding: 0;
        text-align: center;
        background-image:
          linear-gradient(to top, rgba(0, 0, 0, 0.631), rgba(0, 0, 0, 0.631)),
          url("assets/images/container06.jpg");
        background-position: 0 0, center center;
        background-repeat: repeat, no-repeat;
        background-size: auto, cover;
        background-attachment: fixed;
      }

      .hero-inner {
        width: min(100%, 60rem);
        padding: 0 1.25rem;
        animation: rise-in 1s ease both;
      }

      .logo {
        display: block;
        width: 15rem;
        max-width: 72vw;
        height: auto;
        margin: 0 auto 1.25rem;
      }

      h1 {
        width: 100%;
        margin: -0.08em 0 calc(1.25rem - 0.08em);
        padding: 0.08em 0;
        font-family: Poppins, sans-serif;
        font-size: 3.5em;
        font-weight: 700;
        line-height: 1.25;
        letter-spacing: -0.025rem;
        background-image: linear-gradient(7deg, #828181 0%, #f0f0f0 62%);
        -webkit-background-clip: text;
        background-clip: text;
        color: transparent;
        -webkit-text-fill-color: transparent;
        overflow: visible;
      }

      h1 mark {
        color: #7c2dfc;
        background: transparent;
        -webkit-text-fill-color: #7c2dfc;
      }

      .button-list {
        display: flex;
        justify-content: center;
        gap: 1.5rem;
        margin: 0;
        padding: 0;
        list-style: none;
      }

      .contact-button {
        display: inline-flex;
        width: 13rem;
        height: 3.75rem;
        align-items: center;
        justify-content: center;
        gap: 0.75rem;
        padding: 0 0.5rem;
        border: 1px solid #5f476b;
        border-radius: 2.5rem;
        color: rgba(255, 255, 255, 0.831);
        font-family: Inter, sans-serif;
        font-size: 1em;
        font-weight: 500;
        line-height: 1;
        text-decoration: none;
        transition:
          transform 0.25s ease,
          color 0.25s ease,
          background-color 0.25s ease,
          border-color 0.25s ease;
      }

      .contact-button:hover,
      .contact-button:focus-visible {
        transform: scale(1.1125);
      }

      .contact-button svg {
        order: 2;
        width: 1.25em;
        min-width: 16px;
        height: 1.25em;
        fill: #5f476b;
      }

      .footer {
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 3.5rem 1rem;
        text-align: center;
      }

      .footer p {
        margin: 0;
        color: #5f476b;
        font-family: "Open Sans", sans-serif;
        font-size: 0.75em;
        font-weight: 400;
        line-height: 1.875;
      }

      .footer strong {
        font-weight: 700;
      }

      @keyframes rise-in {
        from {
          opacity: 0;
          transform: translateY(1.6875rem);
        }

        to {
          opacity: 1;
          transform: translateY(0);
        }
      }

      @media (max-width: 1680px) {
        html {
          font-size: 13pt;
        }
      }

      @media (max-width: 1280px) {
        .hero {
          background-attachment: scroll;
        }
      }

      @media (max-width: 980px) {
        html {
          font-size: 11pt;
        }
      }

      @media (max-width: 736px) {
        h1 {
          font-size: 3.5em;
          line-height: 1.18;
          letter-spacing: -0.021875rem;
        }

        .footer p {
          font-size: 1em;
        }
      }

      @media (max-width: 480px) {
        .hero-inner {
          padding-inline: 1rem;
        }

        h1 {
          font-size: 3em;
        }

        .contact-button {
          max-width: calc(100vw - 2rem);
        }
      }

      @media (prefers-reduced-motion: reduce) {
        *, *::before, *::after {
          animation-duration: 0.01ms !important;
          animation-iteration-count: 1 !important;
          scroll-behavior: auto !important;
          transition-duration: 0.01ms !important;
        }
      }
    </style>
  </head>
  <body>
    <main class="page">
      <section class="hero" aria-label="Jamie Ransom Sound">
        <div class="hero-inner">
          <img class="logo" src="assets/images/image05.png" alt="Jamie Ransom Sound">
          <h1>Production <mark>Sound</mark> Engineering &amp; Operating.</h1>
          <ul class="button-list" aria-label="Contact links">
            <li>
              <a class="contact-button" href="mailto:jamie@jamieransomsound.com">
                <span>Get In Touch</span>
                <svg aria-hidden="true" viewBox="0 0 40 40" focusable="false">
                  <path d="M38,13.8v16.8c0,1.4-1.1,2.5-2.5,2.5H4.5c-1.4,0-2.5-1.1-2.5-2.5V13.8h0v-3.4c0-1.4,1.1-2.5,2.5-2.5h31c1.4,0,2.5,1.1,2.5,2.5v3.4h0ZM4.5,30.8h31c0,0,.2,0,.2-.2v-14.6l-15,10.2c-.2.1-.4.2-.7.2s-.5,0-.7-.2L4.4,16v14.6c0,0,0,.2.2.2ZM35.5,10.2H4.5c0,0-.2,0-.2.2v2.7l15.6,10.6,15.6-10.6v-2.7c0,0,0-.2-.2-.2Z"></path>
                </svg>
              </a>
            </li>
          </ul>
        </div>
      </section>

      <footer class="footer" id="more">
        <p><strong>&copy; Jamie Ransom Sound Ltd.</strong><br>Registered in England and Wales 07749784.</p>
      </footer>
    </main>
  </body>
</html>
